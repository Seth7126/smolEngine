name: Build smolEngine & smolEditor (Windows)  
  
on:  
  push:  
    branches: [ main, master ]  
  pull_request:  
    branches: [ main, master ]  
  workflow_dispatch:  
  
jobs:  
  windows:  
    name: windows (Release)  
    runs-on: windows-2022  
  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
        with:  
          submodules: recursive  
  
      - name: Bootstrap vcpkg  
        shell: pwsh  
        run: vcpkg\bootstrap-vcpkg.bat -disableMetrics  
  
      - name: Export GitHub Actions cache environment variables  
        uses: actions/github-script@v7  
        with:  
          script: |  
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');  
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');  
  
      - name: Setup MSBuild  
        uses: microsoft/setup-msbuild@v2  
  
      - name: Install vcpkg dependencies  
        shell: pwsh  
        env:  
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"  
          X_VCPKG_REGISTRIES_CACHE: ${{ github.workspace }}\vcpkg_registries_cache  
        run: |  
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg_registries_cache"  
          vcpkg\vcpkg.exe install opengl glew glm "devil[libjpeg,libpng]" assimp sdl2 "imgui[opengl3-binding,sdl2-binding,docking-experimental]" --recurse --triplet x64-windows  
  
      - name: Build solution (Release|x64)  
        shell: cmd  
        env:  
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"  
          X_VCPKG_REGISTRIES_CACHE: ${{ github.workspace }}\vcpkg_registries_cache  
        run: msbuild smolGameMaker.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal  
  
      - name: Collect artifacts  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path artifact | Out-Null  
          Copy-Item "x64\Release\smolEditor.exe" artifact\ -ErrorAction Stop  
          Get-ChildItem "x64\Release\*.dll" | Copy-Item -Destination artifact\  
          if (Test-Path "smolEditor\Assets") { Copy-Item "smolEditor\Assets" "artifact\Assets" -Recurse }  
          Get-ChildItem artifact -Recurse | Select-Object FullName  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: smolEditor-win64-release  
          path: artifact/  
          if-no-files-found: error  
  
      - name: Create GitHub Release  
        if: startsWith(github.ref, 'refs/tags/')  
        uses: softprops/action-gh-release@v2  
        with:  
          files: artifact/**
