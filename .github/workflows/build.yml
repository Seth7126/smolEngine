name: Build smolEngine & smolEditor (Windows)  
  
on:  
  push:  
    branches: [ main, master ]  
  pull_request:  
    branches: [ main, master ]  
  workflow_dispatch:  
  
jobs:  
  windows:  
    name: windows (${{ matrix.configuration }})  
    runs-on: windows-2022  
    strategy:  
      matrix:  
        configuration: [Release, Debug]  
  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
        with:  
          submodules: false  
  
      - name: Clone latest vcpkg  
        shell: pwsh  
        run: |  
          git clone --depth=1 https://github.com/microsoft/vcpkg.git vcpkg  
  
      - name: Bootstrap vcpkg  
        shell: pwsh  
        run: vcpkg\bootstrap-vcpkg.bat -disableMetrics  
  
      - name: Cache vcpkg downloads  
        uses: actions/cache@v4  
        with:  
          path: vcpkg/downloads  
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}  
          restore-keys: |  
            vcpkg-downloads-${{ runner.os }}-  
  
      - name: Setup MSBuild  
        uses: microsoft/setup-msbuild@v2  
  
      - name: Install vcpkg dependencies  
        shell: pwsh  
        run: |  
          vcpkg\vcpkg.exe install --triplet x64-windows --x-manifest-root=. --x-install-root=vcpkg\installed  
  
      - name: Build solution (${{ matrix.configuration }}|x64)  
        shell: cmd  
        run: msbuild smolGameMaker.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m /v:minimal  
  
      - name: Collect artifacts  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path artifact | Out-Null  
          Copy-Item "x64\${{ matrix.configuration }}\smolEditor.exe" artifact\ -ErrorAction Stop  
          Get-ChildItem "x64\${{ matrix.configuration }}\*.dll" | Copy-Item -Destination artifact\  
          if (Test-Path "smolEditor\Assets") { Copy-Item "smolEditor\Assets" "artifact\Assets" -Recurse }  
          Get-ChildItem artifact -Recurse | Select-Object FullName  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: smolEditor-win64-${{ matrix.configuration }}  
          path: artifact/  
          if-no-files-found: error  
  
      - name: Create GitHub Release  
        if: startsWith(github.ref, 'refs/tags/')  
        uses: softprops/action-gh-release@v2  
        with:  
          files: artifact/**
